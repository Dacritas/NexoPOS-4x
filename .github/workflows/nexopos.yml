name: NexoPOS CI/CD

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: nexopos
          MYSQL_USER: nexopos_user
          MYSQL_PASSWORD: nexopos_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - uses: actions/checkout@v4.2.2

    - name: Set up PHP with required extensions
      uses: shivammathur/setup-php@v2
      with:
        php-version: '7.4'
        extensions: json, gd, bcmath, intl, openssl, mbstring, curl, xml, mysqli, zip, pdo, pdo_mysql
        tools: composer

    - name: Set up Node.js
      uses: actions/setup-node@v4.4.0
      with:
        node-version: '14'

    - name: Install PHP dependencies
      run: composer install --prefer-dist --no-progress --no-interaction

    - name: Install JS dependencies
      run: yarn install --no-lockfile --ignore-engines

    - name: Install missing TypeScript types
      run: yarn add @types/minimatch --dev --ignore-engines

    - name: Build frontend assets
      run: yarn prod

    # Configurar .env con prefijo correcto de NexoPOS
    - name: Configure .env file
      run: |
        cp .env.example .env
        sed -i 's/^APP_ENV=.*/APP_ENV=production/' .env
        sed -i 's/^APP_DEBUG=.*/APP_DEBUG=false/' .env
        sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env
        sed -i 's/^DB_DATABASE=.*/DB_DATABASE=nexopos/' .env
        sed -i 's/^DB_USERNAME=.*/DB_USERNAME=nexopos_user/' .env
        sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=nexopos_password/' .env
        sed -i 's/^DB_PORT=.*/DB_PORT=3306/' .env
        # Prefijo correcto de NexoPOS — las tablas usan ns_ como prefijo base
        echo "DB_PREFIX=ns_" >> .env

    - name: Generate application key
      run: php artisan key:generate

    # Paso 1 — Migraciones base de Laravel
    - name: Run base migrations
      run: php artisan migrate --force

    # Paso 2 — Migraciones específicas de NexoPOS en orden correcto
    - name: Run NexoPOS default migrations
      run: php artisan migrate --path=database/migrations/default --force

    - name: Run NexoPOS create-tables migrations
      run: php artisan migrate --path=database/migrations/create-tables --force

    - name: Run NexoPOS misc migrations
      run: php artisan migrate --path=database/migrations/misc --force

    # Paso 3 — Setup de NexoPOS: crea roles, permisos y usuario admin
    # Debe correr ANTES de schema-updates porque esa migración necesita el usuario admin
    - name: Run NexoPOS setup
      run: |
        php artisan ns:setup \
          --store_name="NexoPOS" \
          --admin_username="admin" \
          --admin_email="admin@nexopos.com" \
          --password="admin123" \
          --no-interaction

    # Verificar que el admin existe antes de schema-updates
    - name: Verify admin user exists
      run: |
        mysql -h 127.0.0.1 -u nexopos_user -pnexopos_password nexopos -e "
          SELECT u.id, u.username, r.namespace 
          FROM ns_nexopos_users u 
          JOIN ns_nexopos_roles r ON r.id = (
            SELECT role_id FROM ns_nexopos_users_attributes WHERE user_id = u.id LIMIT 1
          ) LIMIT 5;
        " 2>&1 || true
        mysql -h 127.0.0.1 -u nexopos_user -pnexopos_password nexopos -e "
          SELECT id, name, namespace FROM ns_nexopos_roles;
        " 2>&1 || true

    # Paso 4 — schema-updates requiere que el admin ya exista
    - name: Run NexoPOS schema-updates migrations
      run: php artisan migrate --path=database/migrations/schema-updates --force

    # Limpiar cachés del runner — NO usar config:cache (guarda rutas absolutas del runner)
    - name: Clear caches before packaging
      run: |
        php artisan config:clear
        php artisan cache:clear
        php artisan view:clear
        rm -f bootstrap/cache/config.php
        rm -f bootstrap/cache/routes*.php
        rm -f bootstrap/cache/services.php
        rm -f bootstrap/cache/packages.php

    # Backup completo con datos (roles, permisos, usuario admin ya creados)
    - name: Create database backup
      run: |
        mysqldump -h 127.0.0.1 -u nexopos_user -pnexopos_password \
          --single-transaction \
          --routines \
          --triggers \
          nexopos > nexopos-database-backup.sql

    # ZIP solo con archivos esenciales para deploy
    - name: Create deployment ZIP
      run: |
        zip -r nexopos-deploy.zip \
          app/ \
          bootstrap/ \
          config/ \
          database/ \
          modules/ \
          public/ \
          routes/ \
          storage/ \
          artisan \
          composer.json \
          composer.lock \
          .env

    - name: Upload deployment ZIP
      uses: actions/upload-artifact@v4.6.2
      with:
        name: nexopos-deploy
        path: nexopos-deploy.zip
        retention-days: 7

    - name: Upload database backup
      uses: actions/upload-artifact@v4.6.2
      with:
        name: nexopos-database-backup
        path: nexopos-database-backup.sql
        retention-days: 7
